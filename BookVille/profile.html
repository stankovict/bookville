<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Измена профила</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/x-icon" href="logo-icon/logo1.ico">
</head>
<body>
<nav class="navbar navbar-expand-lg custom-navbar fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="index.html">BookVille</a>
  </div>
</nav>

<div class="container mt-2 pt-2">

  <div class="mb-3">
    <a href="index.html#main" class="btn btn-secondary">
      <i class="fa-solid fa-arrow-left me-2"></i>Почетна
    </a>
  </div>

<div class="container mt-1 pt-1">
  <h2>Измена профила</h2>
  <form id="profileForm" class="mt-3">
    <div class="mb-3">
      <label>Корисничко име</label>
      <input type="text" id="profileUsername" class="form-control">
    </div>
    <div class="mb-3 position-relative">
      <label>Лозинка</label>
      <input type="password" id="profilePassword" class="form-control">
      <i class="fa-solid fa-eye-slash toggle-password" style="position:absolute; right:10px; top:38px; cursor:pointer;"></i>
    </div>
    <div class="mb-3">
      <label>Емаил</label>
      <input type="email" id="profileEmail" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Име</label>
      <input type="text" id="profileFirstName" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Презиме</label>
      <input type="text" id="profileLastName" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Датум рођења</label>
      <input type="date" id="profileBirthdate" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Адреса</label>
      <input type="text" id="profileAddress" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Телефон</label>
      <input type="text" id="profilePhone" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Занимање</label>
      <input type="text" id="profileOccupation" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Сачувај промене</button>
    <button type="button" id="deleteProfileBtn" class="btn btn-danger ms-2">Обриши профил</button>
    <div id="profileMessage" class="text-success mt-2"></div>
    

  </form>
</div>

<script src="js/footer.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
