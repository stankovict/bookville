<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <link rel="icon" type="image/x-icon" href="logo-icon/logo1.ico">
</head>
<body>

    <a class="navbar-brand text-white d-flex align-items-center" href="index.html#main" style="max-width: 60vw;">
  <span>BookVille Online: најбоље књиге на једном месту</span>

            aria-expanded="false">Пријава/Регистрација</a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="showLogin()">Пријава</a></li>
            <li><a class="dropdown-item" href="#" onclick="showRegister()">Регистрација</a></li>
          </ul>
        </li>

<div class="container mt-4">
    <a href="index.html" class="btn btn-secondary mb-3">← Назад на књижаре</a>
  <h1>Корисници</h1>

  <div id="loading" class="text-center my-3">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Учитавање корисника...</p>
  </div>

  <div id="user-list"></div>

  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Измена корисника</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="editForm">
            <input type="hidden" id="editId">

            <div class="mb-3">
  <label for="editUsername" class="form-label">Корисничко име</label>
  <input type="text" class="form-control" id="editUsername" name="editUsername">
  <small id="usernameError" class="text-danger"></small>
</div>
            <div class="mb-3">
              <label>Лозинка</label>
              <input type="text" id="editPassword" class="form-control">
            </div>
            <div class="mb-3">
              <label>Име</label>
              <input type="text" id="editFirstName" class="form-control">
            </div>
            <div class="mb-3">
              <label>Презиме</label>
              <input type="text" id="editLastName" class="form-control">
            </div>
            <div class="mb-3">
  <label for="editEmail" class="form-label">Емаил</label>
  <input type="email" class="form-control" id="editEmail" name="editEmail">
  <small id="emailError" class="text-danger"></small>
</div>
            <div class="mb-3">
              <label>Датум рођења</label>
              <input type="date" id="editDOB" class="form-control">
            </div>
            <div class="mb-3">
              <label>Адреса</label>
              <input type="text" id="editAddress" class="form-control">
            </div>
            <div class="mb-3">
              <label>Телефон</label>
              <input type="text" id="editPhone" class="form-control">
            </div>
            <div class="mb-3">
              <label>Занимање</label>
              <input type="text" id="editOccupation" class="form-control">
            </div>

            <div class="modal-footer">
              <button type="submit" class="btn btn-primary">Сачувај измене</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Откажи</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/footer.js"></script>
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Пријава</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <div class="mb-3">
            <label>Корисничко име или емаил</label>
            <input type="text" id="loginUsername" class="form-control" required>
          </div>
          <div class="mb-3 position-relative">
  <label>Лозинка</label>
  <input type="password" id="loginPassword" class="form-control" required>
  <i class="fa-solid fa-eye-slash toggle-password" style="position:absolute; right:10px; top:38px; cursor:pointer;"></i>
</div>

          <button type="submit" class="btn btn-primary">Пријави се</button>
        </form>
        <div id="loginError" class="text-danger mt-2"></div>
      </div>
    </div>
  </div>
</div>


  <div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Регистрација</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="registerForm">
            <div class="mb-3">
              <label>Корисничко име</label>
              <input type="text" id="regUsername" class="form-control" required>
              <span class="text-danger small" id="errorUsername"></span>
            </div>
            <div class="mb-3 position-relative">
              <label>Лозинка</label>
              <input type="password" id="regPassword" class="form-control" required>
              <i class="fa-solid fa-eye-slash toggle-password" style="position:absolute; right:10px; top:38px; cursor:pointer;"></i>
              <span class="text-danger small" id="errorPassword"></span>
            </div>
            <div class="mb-3">
              <label>Емаил</label>
              <input type="email" id="regEmail" class="form-control" required>
              <span class="text-danger small" id="errorEmail"></span>
            </div>
            <div class="mb-3">
              <label>Име</label>
              <input type="text" id="regFirstName" class="form-control" required>
              <span class="text-danger small" id="errorFirstName"></span>
            </div>
            <div class="mb-3">
              <label>Презиме</label>
              <input type="text" id="regLastName" class="form-control" required>
              <span class="text-danger small" id="errorLastName"></span>
            </div>
            <div class="mb-3">
              <label>Датум рођења</label>
              <input type="date" id="regBirthdate" class="form-control" required>
              <span class="text-danger small" id="errorBirthdate"></span>
            </div>
            <div class="mb-3">
              <label>Адреса</label>
              <input type="text" id="regAddress" class="form-control" required>
              <span class="text-danger small" id="errorAddress"></span>
            </div>
            <div class="mb-3">
              <label>Телефон</label>
              <input type="text" id="regPhone" class="form-control" pattern="^[0-9+\- ]+$" required>
              <span class="text-danger small" id="errorPhone"></span>
            </div>
            <div class="mb-3">
              <label>Занимање</label>
              <input type="text" id="regOccupation" class="form-control" required>
              <span class="text-danger small" id="errorOccupation"></span>
            </div>
            <button type="submit" class="btn btn-secondary">Региструј се</button>
          </form>
          <div id="regError" class="text-danger mt-2"></div>
        </div>
      </div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/adminkoris.js"></script>

  document.addEventListener('DOMContentLoaded', () => initAuthApp(db));

</body>
</html>
